<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina Barberos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="barra-sup">
        <a href="paginaPrincipal.html" class="boton-iniciar-sesion">Cerrar Sesión</a>
    </div>

    <div class="contenedor-principal">

        <div class="barra-izq">
            <button class="boton-barra-izq" onclick="mostrarSeccion('citas')">
                <i class="fa-regular fa-calendar-days icono-barra-izq"></i>
                <span class="texto-barra-izq">Citas</span>
            </button>
        </div>

        <div class="contenedor-secundario">

            <div id="citas" class="seccion-dinamica">
                <h1 class="titulo-principal">Mis Citas Agendadas</h1>
                <h5 style="margin-top: 15px;">Mostrar solamente las citas programadas. no puede editar, agregar o
                    eliminar.</h5>
            </div>

        </div>

    </div>

    <script>
        function mostrarSeccion(idSeccion) {
            // 1. Captura en un arreglo todos los bloques que tengan asignada la clase 'seccion-dinamica'
            let secciones = document.querySelectorAll('.seccion-dinamica');

            // 2. Ejecuta un ciclo para ocultar temporalmente todas las pantallas encontradas (display = 'none')
            secciones.forEach(function (seccion) {
                seccion.style.display = 'none';
            });

            // 3. Busca de forma precisa el ID enviado por el botón pulsado y lo vuelve visible (display = 'block')
            document.getElementById(idSeccion).style.display = 'block';
        }
    </script>

</body>

</html>
